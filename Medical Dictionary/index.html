<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Dictioary</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 class="heading">Medical Dictionary</h1>
        <input placeholder="Search a disease or medical term...." type="text" class="input" id="input">
        <p class="info-test" id="info-text" >Type a word and press enter</p>
        <div class="meaning-container" id="meaning-container">
            <p>Word Title: <span class="title" id="title">______</span></p>
            <p>Meaning: <span class="meaning" id="meaning">_______</span></p>
            <button id="speakBtn">🔊 Listen</button>
            
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
